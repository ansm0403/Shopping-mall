services:
  # PostgreSQL 데이터베이스
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 배포 환경에서는 DB 포트를 호스트에 퍼블리시하지 않음 (외부 직접 접근 차단)
    # 로컬 개발 중 DBeaver 등 DB 툴 접속이 필요하면 아래 주석 해제
    # ports:
    #   - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis 캐시 / 세션 스토어
  redis:
    image: redis:alpine
    restart: unless-stopped
    # 배포 환경에서는 Redis 포트를 호스트에 퍼블리시하지 않음
    # Redis는 기본 설정에서 비밀번호 없이 익명 접근 허용 — 세션토큰 탈취 위험
    # 로컬 개발 중 redis-cli 접근이 필요하면 아래 주석 해제
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # NestJS 백엔드 API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-prod
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # .env의 localhost 값을 컨테이너 서비스명으로 오버라이드
      # Docker 내부 네트워크에서는 서비스명이 호스트명 역할을 함
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # globalPrefix가 'v1'이므로 /v1/health가 올바른 경로
      test: ["CMD-SHELL", "curl -f http://localhost:4000/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: shopping-mall-network
