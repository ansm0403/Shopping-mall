## 로컬 docker compose 파일

version: '3.8'

services:
  # PostgreSQL 데이터베이스
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./backend/postgres-data:/docker-entrypoint-initdb.d
    ports:
      - "4321:5432"
    environment:
      POSTGRES_USER: sangmoon
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sangmoon
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sangmoon"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis 캐시
  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  default:
    name: shopping-mall-local-network
